<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 100" width="700" height="100">
  <!-- Phase 1: Waxing Crescent -->
  <g fill="white">
    <path d="M 50 10 A 40 40 0 0 1 50 90 A 25 40 0 0 0 50 10 Z" />
    <circle cx="65" cy="40" r="3" fill="#050505" />
    <circle cx="75" cy="65" r="2" fill="#050505" />
  </g>
  
  <!-- Phase 2: First Quarter -->
  <g fill="white">
    <path d="M 150 10 A 40 40 0 0 1 150 90 L 150 10 Z" />
    <circle cx="165" cy="30" r="5" fill="#050505" />
    <circle cx="180" cy="50" r="4" fill="#050505" />
    <circle cx="160" cy="70" r="6" fill="#050505" />
    <circle cx="175" cy="80" r="2" fill="#050505" />
  </g>

  <!-- Phase 3: Waxing Gibbous -->
  <g fill="white">
    <path d="M 250 10 A 40 40 0 0 1 250 90 A 25 40 0 0 1 250 10 Z" />
    <circle cx="265" cy="35" r="6" fill="#050505" />
    <circle cx="240" cy="20" r="4" fill="#050505" />
    <circle cx="280" cy="60" r="7" fill="#050505" />
    <circle cx="250" cy="75" r="5" fill="#050505" />
    <circle cx="230" cy="50" r="3" fill="#050505" />
  </g>

  <!-- Phase 4: Full Moon -->
  <g fill="white">
    <circle cx="350" cy="50" r="40" />
    <circle cx="330" cy="30" r="8" fill="#050505" />
    <circle cx="370" cy="40" r="5" fill="#050505" />
    <circle cx="340" cy="70" r="6" fill="#050505" />
    <circle cx="360" cy="80" r="3" fill="#050505" />
    <circle cx="320" cy="55" r="4" fill="#050505" />
    <circle cx="380" cy="65" r="2" fill="#050505" />
  </g>

  <!-- Phase 5: Waning Gibbous -->
  <g fill="white">
    <path d="M 450 10 A 40 40 0 0 0 450 90 A 25 40 0 0 0 450 10 Z" />
    <circle cx="435" cy="35" r="6" fill="#050505" />
    <circle cx="460" cy="20" r="4" fill="#050505" />
    <circle cx="420" cy="60" r="7" fill="#050505" />
    <circle cx="450" cy="75" r="5" fill="#050505" />
    <circle cx="470" cy="50" r="3" fill="#050505" />
  </g>

  <!-- Phase 6: Last Quarter -->
  <g fill="white">
    <path d="M 550 10 A 40 40 0 0 0 550 90 L 550 10 Z" />
    <circle cx="535" cy="30" r="5" fill="#050505" />
    <circle cx="520" cy="50" r="4" fill="#050505" />
    <circle cx="540" cy="70" r="6" fill="#050505" />
    <circle cx="525" cy="80" r="2" fill="#050505" />
  </g>

  <!-- Phase 7: Waning Crescent -->
  <g fill="white">
    <path d="M 650 10 A 40 40 0 0 0 650 90 A 25 40 0 0 1 650 10 Z" />
    <circle cx="635" cy="40" r="3" fill="#050505" />
    <circle cx="625" cy="65" r="2" fill="#050505" />
  </g>
</svg>
